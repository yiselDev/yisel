<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel Ramirez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfbfb; min-height: 100vh; font-family: 'Montserrat', sans-serif; color: #333; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .card { flex: 0 0 320px; background: white; border-radius: 30px; padding: 30px; box-shadow: 10px 10px 30px rgba(0,0,0,0.05); }
        .carousel-track { display: flex; gap: 20px; overflow-x: auto; padding: 20px; scroll-behavior: smooth; }
        .lang-btn { cursor: pointer; padding: 8px 16px; border-radius: 20px; font-weight: 600; background: #fff; border: 1px solid #eee; transition: 0.3s; }
        .lang-btn.active { background: #333; color: white; }
    </style>
</head>
<body>
    <nav class="p-8 max-w-7xl mx-auto flex justify-between items-center">
        <div class="text-2xl font-serif italic font-bold">Yisel R.</div>
        <div class="flex gap-2">
            <button onclick="changeLang('es')" id="btn-es" class="lang-btn active">ES</button>
            <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
            <button onclick="changeLang('de')" id="btn-de" class="lang-btn">DE</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        <section class="flex flex-col md:flex-row items-center gap-12 mb-20 mt-10">
            
            <div class="w-full md:w-1/3 flex justify-center md:justify-start">
                <div class="relative">
                    <div class="absolute -inset-4 bg-pink-100 rounded-[50px] -rotate-3"></div>
                    <div class="relative w-64 h-80 overflow-hidden rounded-[40px] shadow-2xl bg-gray-200">
                        <img src="IMG_20260413_102249.jpg" alt="Yisel Ramirez" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Yisel+Ramirez';">
                    </div>
                </div>
            </div>

            <div class="text-left w-full md:w-2/3">
                <h1 id="main-title" class="text-6xl md:text-8xl font-bold text-gray-900 leading-tight">Yisel<br>Ramirez</h1>
                <div style="width: 50px; height: 5px; background: #ff9a9e; margin: 25px 0;"></div>
                <p id="main-desc" class="text-xl text-gray-400 italic font-light">Perfil académico y profesional.</p>
                <div class="mt-8">
                    <a href="mailto:tu-correo@ejemplo.com" id="nav-contact" class="bg-black text-white px-8 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition">Contacto</a>
                </div>
            </div>

        </section>

        <h2 id="section-title" class="text-3xl font-serif mb-8 border-b pb-4">Historial Académico</h2>
        <div class="carousel-track" id="academic-track">
            </div>
    </main>

    <script>
        const content = {
            es: { title: "Yisel<br>Ramirez", section: "Historial Académico", desc: "Perfil académico y profesional.", contact: "Contacto",
                cards: [
                    { year: "2023 - 2026", title: "Estudios Actuales", info: "Descripción de tu formación en Alemania.", inst: "Institución" },
                    { year: "2022", title: "Idioma Alemán", info: "Nivel avanzado C1.", inst: "Goethe Institut" },
                    { year: "2021", title: "Bachillerato", info: "Formación académica previa.", inst: "Colegio" }
                ]
            },
            en: { title: "Yisel<br>Ramirez", section: "Academic Background", desc: "Academic and professional profile.", contact: "Contact",
                cards: [
                    { year: "2023 - 2026", title: "Current Studies", info: "Description of your training in Germany.", inst: "Institution" },
                    { year: "2022", title: "German Language", info: "Advanced C1 level.", inst: "Goethe Institut" },
                    { year: "2021", title: "High School", info: "Previous academic background.", inst: "College" }
                ]
            },
            de: { title: "Yisel<br>Ramirez", section: "Bildungsweg", desc: "Akademisches und berufliches Profil.", contact: "Kontakt",
                cards: [
                    { year: "2023 - 2026", title: "Aktuelles Studium", info: "Beschreibung Ihrer Ausbildung in Deutschland.", inst: "Hochschule" },
                    { year: "2022", title: "Deutschkurs", info: "Fortgeschrittenes C1-Niveau.", inst: "Goethe-Institut" },
                    { year: "2021", title: "Abitur", info: "Bisheriger akademischer Hintergrund.", inst: "Schule" }
                ]
            }
        };

        function changeLang(lang) {
            document.getElementById('main-title').innerHTML = content[lang].title;
            document.getElementById('main-desc').innerText = content[lang].desc;
            document.getElementById('section-title').innerText = content[lang].section;
            document.getElementById('nav-contact').innerText = content[lang].contact;
            const track = document.getElementById('academic-track');
            track.innerHTML = ''; 
            content[lang].cards.forEach(card => {
                track.innerHTML += `
                    <div class="card">
                        <span class="text-xs font-bold text-pink-400 uppercase tracking-widest">${card.year}</span>
                        <h3 class="text-2xl font-serif mt-2 mb-4">${card.title}</h3>
                        <p class="text-gray-500 text-sm leading-relaxed">${card.info}</p>
                        <div class="mt-auto pt-4 border-t border-gray-100 text-[10px] font-bold text-gray-400 uppercase">${card.inst}</div>
                    </div>`;
            });
            ['es', 'en', 'de'].forEach(btn => document.getElementById('btn-' + btn).classList.toggle('active', btn === lang));
        }
        changeLang('es');
    </script>
</body>
</html>
