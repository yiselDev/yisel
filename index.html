<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%); min-height: 100vh; font-family: 'Montserrat', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .card { flex: 0 0 350px; background: white; border-radius: 40px 10px 40px 10px; padding: 40px; box-shadow: 20px 20px 60px #d1d1d1; transition: 0.4s; }
        .carousel-track { display: flex; gap: 30px; overflow-x: auto; padding: 40px 20px; }
        .lang-btn { cursor: pointer; padding: 10px 20px; border-radius: 15px; font-weight: 600; background: #fff; color: #888; border: 1px solid #eee; }
        .lang-btn.active { background: #333; color: #fff; }
        .btn-contact { background: #333; color: white; padding: 15px 40px; border-radius: 50px; font-weight: 600; display: inline-block; }
    </style>
</head>
<body>
    <nav class="p-10 max-w-7xl mx-auto flex justify-between items-center">
        <div class="text-3xl font-serif italic">Yisel.</div>
        <div class="flex gap-4">
            <button onclick="changeLang('es')" id="btn-es" class="lang-btn active">ES</button>
            <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
            <button onclick="changeLang('de')" id="btn-de" class="lang-btn">DE</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <section class="grid md:grid-cols-[1fr,300px] gap-10 items-center mb-24 mt-10">
            <div>
                <h1 id="main-title" class="text-6xl md:text-9xl font-bold text-gray-900">Yisel</h1>
                <div style="width: 60px; height: 4px; background: #ff9a9e; margin: 20px 0;"></div>
                <p id="main-desc" class="text-xl text-gray-500 italic mb-10">Mi camino académico detallado con elegancia.</p>
                <a href="mailto:tu-correo@ejemplo.com" id="nav-contact" class="btn-contact uppercase text-xs">Ponerse en contacto</a>
            </div>
            
            <div class="flex justify-end">
                <div class="relative w-64 h-80">
                    <div class="absolute inset-0 bg-pink-200 rounded-[60px] rotate-6"></div>
                    <img src="foto.jpg" alt="Yisel" class="absolute inset-0 w-full h-full object-cover rounded-[60px] shadow-2xl">
                </div>
            </div>
        </section>

        <h2 id="section-title" class="text-4xl font-serif mb-10">Formación</h2>
        <div class="carousel-track" id="academic-track"></div>
    </main>

    <script>
        const content = {
            es: { title: "Yisel", section: "Formación Académica", desc: "Mi camino académico detallado con elegancia.", contact: "Ponerse en contacto",
                cards: [{ year: "2023", title: "Grado Superior", info: "Excelencia académica en Alemania.", inst: "Universidad" }]
            },
            en: { title: "Yisel", section: "Educational Background", desc: "My educational journey detailed with elegance.", contact: "Get in touch",
                cards: [{ year: "2023", title: "Higher Education", info: "Academic excellence in Germany.", inst: "University" }]
            },
            de: { title: "Yisel", section: "Bildungsweg", desc: "Mein akademischer Weg, elegant dokumentiert.", contact: "Kontakt aufnehmen",
                cards: [{ year: "2023", title: "Studium", info: "Akademische Exzellenz in Deutschland.", inst: "Universität" }]
            }
        };

        function changeLang(lang) {
            document.getElementById('main-title').innerText = content[lang].title;
            document.getElementById('main-desc').innerText = content[lang].desc;
            document.getElementById('section-title').innerText = content[lang].section;
            document.getElementById('nav-contact').innerText = content[lang].contact;
            const track = document.getElementById('academic-track');
            track.innerHTML = ''; 
            content[lang].cards.forEach(card => {
                track.innerHTML += `
                    <div class="card">
                        <span class="text-xs font-semibold text-pink-400 uppercase">${card.year}</span>
                        <h3 class="text-3xl font-serif mt-4 mb-6">${card.title}</h3>
                        <p class="text-gray-500 text-sm mb-8">${card.info}</p>
                        <div class="mt-auto pt-6 border-t text-xs font-bold text-gray-400">${card.inst}</div>
                    </div>`;
            });
            ['es', 'en', 'de'].forEach(btn => document.getElementById('btn-' + btn).classList.toggle('active', btn === lang));
        }
        changeLang('es');
    </script>
</body>
</html>
