<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel Ramirez | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfbfb; font-family: 'Montserrat', sans-serif; color: #333; scroll-behavior: smooth; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        /* Efecto de tarjetas interactivas */
        .interactive-card { 
            background: white; 
            border-radius: 25px; 
            padding: 30px; 
            border: 1px solid #f0f0f0; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            height: 100%;
        }
        
        .interactive-card:hover { 
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border-color: #ff9a9e;
        }

        .interactive-card:active { transform: scale(0.98); }

        .lang-btn { cursor: pointer; padding: 8px 16px; border-radius: 20px; font-weight: 600; background: #fff; border: 1px solid #eee; font-size: 12px; transition: 0.3s; }
        .lang-btn.active { background: #333 !important; color: white !important; border-color: #333; }
        
        .tag { background: #fff5f5; color: #ff9a9e; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .photo-wrapper { width: 300px; height: 400px; background: #eee; border-radius: 40px; overflow: hidden; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.5s; }
        .photo-wrapper:hover { transform: rotate(2deg) scale(1.02); }

        /* Modal de Contacto */
        #modal-contacto { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px); 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-content { 
            background: white; 
            padding: 40px; 
            border-radius: 35px; 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        #modal-contacto.active { display: flex; opacity: 1; }
        #modal-contacto.active .modal-content { transform: scale(1); }
    </style>
</head>
