<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel Ramirez | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfbfb; font-family: 'Montserrat', sans-serif; color: #333; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .tarjeta-movil { background: white; border-radius: 25px; padding: 30px; border: 1px solid #f0f0f0; transition: all 0.4s ease; height: 100%; }
        .tarjeta-movil:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); border-color: #ff9a9e; }
        .lang-btn { cursor: pointer; padding: 8px 16px; border-radius: 20px; font-weight: 600; background: #fff; border: 1px solid #eee; font-size: 12px; transition: 0.3s; }
        .lang-btn.active { background: #333 !important; color: white !important; }
        .tag { background: #fff5f5; color: #ff9a9e; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .clicable { cursor: pointer; transition: color 0.3s; }
        .clicable:hover { color: #ff9a9e; }
        .photo-wrapper { width: 300px; height: 400px; background: #eee; border-radius: 40px; overflow: hidden; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        /* Estilo para el visor de PDF */
        .pdf-container { width: 100%; height: 500px; border-radius: 15px; border: 1px solid #eee; margin-top: 15px; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-8 max-w-7xl mx-auto flex justify-between items-center">
        <div class="text-2xl font-bold italic">Y. Ramirez</div>
        <div class="flex gap-2">
            <button onclick="changeLang('es')" id="btn-es" class="lang-btn active">ES</button>
            <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
            <button onclick="changeLang('de')" id="btn-de" class="lang-btn">DE</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        <section class="flex flex-col md:flex-row items-center justify-between gap-12 mb-16">
            <div class="w-full md:w-2/3">
                <h1 class="text-5xl md:text-7xl font-bold text-gray-900 mb-6">Yisel Ramirez</h1>
                <p id="main-desc" class="text-2xl text-gray-400 italic font-light max-w-xl"></p>
                <div class="mt-8">
                    <a href="mailto:tu-correo@ejemplo.com" id="btn-contact" class="inline-block bg-black text-white px-8 py-4 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-pink-400 transition transform hover:-translate-y-1 shadow-lg">Contactar</a>
                </div>
            </div>
            <div class="photo-wrapper">
                <img src="foto.jpg" alt="Yisel Ramirez">
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="tarjeta-movil">
                <h2 id="head-langs" class="text-2xl font-bold mb-6 italic"></h2>
                <div class="space-y-3">
                    <div onclick="abrirModal('derecho')" class="clicable group">
                        <h3 id="sub-aner" class="font-bold text-lg group-hover:text-pink-400 transition-colors"></h3>
                        <p id="desc-aner" class="text-gray-500 text-sm italic"></p>
                    </div>
                    <hr class="my-4 border-gray-100">
                    <p onclick="abrirModal('langDe')" class="clicable text-gray-400 text-xs italic" id="txt-lang-de"></p>
                    <p onclick="abrirModal('langEs')" class="clicable text-gray-400 text-xs italic" id="txt-lang-es"></p>
                </div>
            </div>

            <div onclick="abrirModal('it')" class="tarjeta-movil cursor-pointer group">
                <h2 id="head-edu" class="text-2xl font-bold mb-6 italic"></h2>
                <span id="tag-now" class="tag"></span>
                <h3 class="font-bold text-lg mt-2 group-hover:text-pink-400 transition-colors">Fachinformatikerin i.A.</h3>
                <p id="desc-it" class="text-gray-500 text-sm mt-1"></p>
            </div>

            <div class="tarjeta-movil">
                <h2 id="head-doc" class="text-2xl font-bold mb-6 italic"></h2>
                <div class="space-y-4 text-sm font-medium">
                    <p onclick="abrirModal('exp')" class="clicable" id="doc-exp"></p>
                    <p onclick="abrirModal('carta')" class="clicable" id="doc-carta"></p>
                    <p onclick="abrirModal('skills')" class="clicable" id="doc-skills"></p>
                    <p onclick="abrirModal('hobbies')" class="clicable" id="doc-hobbies"></p>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-info" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm" onclick="if(event.target == this) cerrarModal()">
        <div class="bg-white w-full max-w-4xl rounded-[40px] p-8 relative shadow-2xl overflow-y-auto max-h-[90vh]">
            <button onclick="cerrarModal()" class="absolute top-6 right-8 text-3xl text-gray-300 hover:text-pink-400">&times;</button>
            <h2 id="modal-titulo" class="text-3xl font-serif mb-4 text-gray-900 border-b pb-4"></h2>
            
            <div id="modal-cuerpo" class="text-gray-600 leading-relaxed text-lg whitespace-pre-line">
                </div>
        </div>
    </div>

    <script>
        let currentLang = 'es';

        const content = {
            es: {
                mainDesc: "Licenciada en Derecho con equivalencia académica en Alemania (ZAB). Especializándome en IT.",
                contact: "Contactar", edu: "Formación", langs: "Títulos & Idiomas", doc: "Documentación",
                tagNow: "En curso", descIt: "Umschulung: Systemintegration. Clic para ver detalles.",
                subAner: "Licenciatura en Derecho", descAner: "Homologación ZAB (Anabin H+). Clic para ver título.",
                docExp: "• Experiencia Laboral (CV)", docCarta: "• Carta de Motivación", docSkills: "• Habilidades", docHobbies: "• Intereses",
                it: { t: "Formación en Informática", c: "Actualmente realizando una 'Umschulung' como Fachinformatikerin für Systemintegration.", file: "" },
                derecho: { t: "Licenciatura en Derecho", c: "Título oficialmente reconocido por la ZAB como equivalente a nivel universitario alemán.", file: "titulo_derecho.pdf" },
                langDe: { t: "Certificado de Alemán", c: "Nivel B2 certificado.", file: "certificado_b2.pdf" },
                langEs: { t: "Español: Nativo", c: "Lengua materna.", file: "" },
                exp: { t: "Curriculum Vitae", c: "Resumen de trayectoria profesional y técnica.", file: "curriculum.pdf" },
                carta: { t: "Carta de Motivación", c: "Visión profesional y transición al sector IT.", file: "" },
                skills: { t: "Habilidades", c: "• Análisis jurídico\n• Administración de redes (en curso)\n• Resolución de problemas técnicos.", file: "" },
                hobbies: { t: "Sobre mí", c: "Pasión por el aprendizaje, tecnología y cultura.", file: "" }
            },
            de: {
                mainDesc: "Rechtswissenschaftlerin mit ZAB-Anerkennung. IT-Spezialisierung.",
                contact: "Kontakt", edu: "Ausbildung", langs: "Studium & Sprachen", doc: "Dokumente",
                tagNow: "Laufend", descIt: "Umschulung Systemintegration. Klicken für Details.",
                subAner: "Rechtswissenschaftlerin", descAner: "ZAB-Anerkennung (Anabin H+). Klicken für Abschluss.",
                docExp: "• Berufserfahrung (Lebenslauf)", docCarta: "• Motivationsschreiben", docSkills: "• Fähigkeiten", docHobbies: "• Hobbys",
                it: { t: "IT-Ausbildung", c: "Umschulung zur Fachinformatikerin für Systemintegration.", file: "" },
                derecho: { t: "Rechtsstudium", c: "ZAB Anerkennung (Anabin H+). Offiziell gleichwertiger Abschluss.", file: "titulo_derecho.pdf" },
                langDe: { t: "Deutsch B2", c: "Zertifiziertes B2 Niveau.", file: "certificado_b2.pdf" },
                langEs: { t: "Spanisch: Muttersprache", c: "Exzellente Sprachkenntnisse.", file: "" },
                exp: { t: "Lebenslauf", c: "Beruflicher Werdegang und Qualifikationen.", file: "curriculum.pdf" },
                carta: { t: "Motivationsschreiben", c: "Warum ich mich für IT entschieden habe.", file: "" },
                skills: { t: "Fähigkeiten", c: "• Analytik\n• Netzwerktechnik (in Ausbildung)\n• IT-Infrastruktur", file: "" },
                hobbies: { t: "Interessen", c: "Technologie, Sprachen und Kultur.", file: "" }
            }
        };

        function changeLang(lang) {
            currentLang = lang;
            const d = content[lang];
            document.getElementById('main-desc').innerText = d.mainDesc;
            document.getElementById('btn-contact').innerText = d.contact;
            document.getElementById('head-edu').innerText = d.edu;
            document.getElementById('head-langs').innerText = d.langs;
            document.getElementById('head-doc').innerText = d.doc;
            document.getElementById('tag-now').innerText = d.tagNow;
            document.getElementById('desc-it').innerText = d.descIt;
            document.getElementById('txt-lang-de').innerText = d.langDe.t;
            document.getElementById('txt-lang-es').innerText = d.langEs.t;
            document.getElementById('sub-aner').innerText = d.subAner;
            document.getElementById('desc-aner').innerText = d.descAner;
            document.getElementById('doc-exp').innerText = d.docExp;
            document.getElementById('doc-carta').innerText = d.docCarta;
            document.getElementById('doc-skills').innerText = d.docSkills;
            document.getElementById('doc-hobbies').innerText = d.docHobbies;

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }

        function abrirModal(tipo) {
            const info = content[currentLang][tipo];
            document.getElementById('modal-titulo').innerText = info.t;
            
            let htmlContent = `<p>${info.c}</p>`;

            // Si hay un archivo, añadimos el visor protegido (iframe)
            if (info.file && info.file !== "") {
                htmlContent += `
                    <div class="mt-6 border-t pt-4">
                        <p class="text-xs text-gray-400 mb-2 italic">Vista previa protegida (Solo lectura):</p>
                        <iframe src="${info.file}#toolbar=0&navpanes=0" class="pdf-container"></iframe>
                    </div>
                `;
            }

            document.getElementById('modal-cuerpo').innerHTML = htmlContent;
            document.getElementById('modal-info').classList.remove('hidden');
            document.getElementById('modal-info').classList.add('flex');
        }

        function cerrarModal() {
            document.getElementById('modal-info').classList.replace('flex', 'hidden');
            document.getElementById('modal-cuerpo').innerHTML = ""; // Limpiamos para seguridad
        }

        window.onload = () => changeLang('es');
    </script>
</body>
</html>
