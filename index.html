<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel Ramirez | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfbfb; font-family: 'Montserrat', sans-serif; color: #333; }
        .foto-perfil { width: 280px; height: 350px; object-fit: cover; border-radius: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); border: 5px solid white; }
        .tarjeta-estilo { background: white; border-radius: 25px; padding: 25px; border: 1px solid #eee; transition: 0.3s; cursor: pointer; }
        .tarjeta-estilo:hover { transform: translateY(-5px); border-color: #ff9a9e; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .visor-pdf { width: 100%; height: 500px; border-radius: 15px; border: none; margin-top: 15px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row items-center gap-12 mb-16">
            <img src="foto.jpg" alt="Yisel Ramirez" class="foto-perfil">
            <div class="text-center md:text-left">
                <h1 class="text-6xl font-bold font-serif text-gray-900 mb-4">Yisel Ramirez</h1>
                <p id="subtitulo-hero" class="text-2xl text-gray-400 italic font-light"></p>
                <div class="mt-6 flex gap-3 justify-center md:justify-start">
                    <button onclick="ponerIdioma('es')" class="px-4 py-2 border rounded-full hover:bg-black hover:text-white transition">ES</button>
                    <button onclick="ponerIdioma('de')" class="px-4 py-2 border rounded-full hover:bg-black hover:text-white transition">DE</button>
                </div>
            </div>
        </header>

        <div onclick="mostrarVentana('cv')" class="tarjeta-estilo border-l-[15px] border-l-black mb-8">
            <h2 class="text-3xl font-bold font-serif">Curriculum Vitae</h2>
            <p id="texto-cv" class="text-gray-400 mt-1"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div onclick="mostrarVentana('derecho')" class="tarjeta-estilo border-l-[15px] border-l-blue-400">
                <h3 id="titulo-derecho" class="text-2xl font-bold font-serif"></h3>
                <p id="texto-derecho" class="text-gray-400 mt-1"></p>
            </div>
            <div onclick="mostrarVentana('idioma')" class="tarjeta-estilo border-l-[15px] border-l-red-400">
                <h3 id="titulo-idioma" class="text-2xl font-bold font-serif"></h3>
                <p id="texto-idioma" class="text-gray-400 mt-1"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div onclick="mostrarVentana('it')" class="tarjeta-estilo border-l-[15px] border-l-green-400">
                <h3 class="text-2xl font-bold font-serif">Fachinformatikerin i.A.</h3>
                <p id="texto-it" class="text-gray-400 mt-1"></p>
            </div>
            <div class="tarjeta-estilo border-l-[15px] border-l-pink-400 cursor-default">
                <h3 id="titulo-otros" class="text-2xl font-bold font-serif mb-4"></h3>
                <div class="space-y-3">
                    <p onclick="mostrarVentana('carta')" class="hover:text-pink-400 cursor-pointer font-medium">● Carta de Motivación</p>
                    <p onclick="mostrarVentana('habilidades')" class="hover:text-pink-400 cursor-pointer font-medium">● Habilidades & Skills</p>
                    <p onclick="mostrarVentana('intereses')" class="hover:text-pink-400 cursor-pointer font-medium">● Intereses</p>
                </div>
            </div>
        </div>
    </div>

    <div id="mi-ventana" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50" onclick="if(event.target == this) cerrarVentana()">
        <div class="bg-white w-full max-w-5xl p-10 rounded-[40px] relative max-h-[90vh] overflow-y-auto shadow-2xl">
            <button onclick="cerrarVentana()" class="absolute top-6 right-8 text-4xl text-gray-400">&times;</button>
            <h2 id="titulo-ventana" class="text-4xl font-serif mb-6 border-b pb-4"></h2>
            <div id="cuerpo-ventana"></div>
        </div>
    </div>

    <script>
        const contenido = {
            es: {
                hero: "Licenciada en Derecho con equivalencia académica en Alemania (ZAB). Especializándome en IT.",
                cvDesc: "Ver trayectoria profesional completa.",
                titDer: "Licenciatura en Derecho", texDer: "Homologación ZAB (Anabin H+).",
                titIdi: "Idiomas & Certificados", texIdi: "Alemán B2 y Español Nativo.",
                texIt: "Umschulung: Systemintegration.",
                titOtr: "Otros detalles",
                cv: { t: "Curriculum Vitae", f: "curriculum.pdf", c: "Resumen de mi perfil profesional." },
                derecho: { t: "Anerkennung ZAB", f: "titulo_derecho.pdf", c: "Título reconocido en Alemania." },
                idioma: { t: "Certificados", f: "certificado_b2.pdf", c: "Nivel B2 de Alemán." },
                it: { t: "Formación IT", f: "", c: "Actualmente cursando especialización técnica." },
                carta: { t: "Carta de Motivación", f: "", c: "Mis metas y visión profesional." },
                habilidades: { t: "Habilidades", f: "", c: "Derecho, Sistemas y Análisis." },
                intereses: { t: "Intereses", f: "", c: "Tecnología y Aprendizaje Continuo." }
            },
            de: {
                hero: "Rechtswissenschaftlerin mit ZAB-Anerkennung. IT-Spezialisierung.",
                cvDesc: "Meinen vollständigen Werdegang ansehen.",
                titDer: "Jura-Abschluss", texDer: "ZAB Anerkennung (Anabin H+).",
                titIdi: "Sprachen", texIdi: "Deutsch B2 und Muttersprache.",
                texIt: "Umschulung: Systemintegration.",
                titOtr: "Weitere Details",
                cv: { t: "Lebenslauf", f: "curriculum.pdf", c: "Beruflicher Werdegang." },
                derecho: { t: "ZAB Anerkennung", f: "titulo_derecho.pdf", c: "Gleichwertigkeitsbescheid." },
                idioma: { t: "Sprachzertifikate", f: "certificado_b2.pdf", c: "Deutsch B2 Zertifikat." },
                it: { t: "IT Ausbildung", f: "", c: "Fachinformatikerin Systemintegration." },
                carta: { t: "Motivationsschreiben", f: "", c: "Warum ich in die IT gewechselt bin." },
                habilidades: { t: "Fähigkeiten", f: "", c: "Analytik und Technik." },
                intereses: { t: "Interessen", f: "", c: "Technologie und lebenslanges Lernen." }
            }
        };

        let idiomaSeleccionado = 'es';

        function ponerIdioma(idioma) {
            idiomaSeleccionado = idioma;
            const c = contenido[idioma];
            document.getElementById('subtitulo-hero').innerText = c.hero;
            document.getElementById('texto-cv').innerText = c.cvDesc;
            document.getElementById('titulo-derecho').innerText = c.titDer;
            document.getElementById('texto-derecho').innerText = c.texDer;
            document.getElementById('titulo-idioma').innerText = c.titIdi;
            document.getElementById('texto-idioma').innerText = c.texIdi;
            document.getElementById('texto-it').innerText = c.texIt;
            document.getElementById('titulo-otros').innerText = c.titOtr;
        }

        function mostrarVentana(tipo) {
            const info = contenido[idiomaSeleccionado][tipo];
            document.getElementById('titulo-ventana').innerText = info.t;
            let html = `<p class="text-xl mb-6">${info.c}</p>`;
            if(info.f) {
                html += `<iframe src="${info.f}#toolbar=0" class="visor-pdf"></iframe>`;
            }
            document.getElementById('cuerpo-ventana').innerHTML = html;
            document.getElementById('mi-ventana').classList.remove('hidden');
            document.getElementById('mi-ventana').classList.add('flex');
        }

        function cerrarVentana() {
            document.getElementById('mi-ventana').classList.replace('flex', 'hidden');
        }

        window.onload = () => ponerIdioma('es');
    </script>
</body>
</html>
