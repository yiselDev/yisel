<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel Ramirez | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { background: #fdfbfb; font-family: 'Montserrat', sans-serif; color: #333; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* Forzamos el movimiento por CSS por si Tailwind falla en tu navegador */
        .box-link {
            transition: all 0.3s ease-in-out !important;
            display: block !important;
        }
        
        /* Esto hará que el cuadro suba y se vea la mano del ratón */
        .box-link:hover {
            transform: translateY(-15px) !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            cursor: pointer !important;
        }

        .lang-btn { cursor: pointer; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; }
        .lang-btn.active { background: #000; color: #fff; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="flex justify-end gap-2 mb-10">
        <button onclick="changeLang('es')" id="btn-es" class="lang-btn active">ES</button>
        <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
        <button onclick="changeLang('de')" id="btn-de" class="lang-btn">DE</button>
    </div>

    <main class="max-w-6xl mx-auto">
        <div class="mb-16">
            <h1 class="text-6xl font-bold mb-4">Yisel Ramirez</h1>
            <p id="main-desc" class="text-2xl text-gray-400 italic">Licenciada en Derecho con equivalencia académica en Alemania.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="bg-white p-8 rounded-[30px] border border-gray-100 shadow-sm">
                <h2 id="head-edu" class="text-2xl font-bold mb-4 italic">Formación</h2>
                <p class="text-pink-400 font-bold text-xs mb-2">ACTUALIDAD</p>
                <h3 class="text-xl font-bold">Fachinformatikerin</h3>
                <p id="desc-it" class="text-gray-500">Systemintegration (Umschulung i.A.)</p>
            </div>

            <a href="tu-cv.pdf" target="_blank" class="box-link bg-black text-white p-8 rounded-[30px] shadow-xl">
                <h2 class="text-gray-500 text-xs uppercase mb-4">Click para abrir</h2>
                <h3 id="card-cv" class="text-3xl font-serif">Curriculum Vitae</h3>
                <p id="card-cv-sub" class="mt-4 text-gray-400 text-sm">Lebenslauf digital ↓</p>
            </a>

            <a href="tus-certificados.pdf" target="_blank" class="box-link bg-pink-100 p-8 rounded-[30px] shadow-lg">
                <h2 class="text-pink-400 text-xs uppercase mb-4">Certificaciones</h2>
                <h3 id="card-cert" class="text-3xl font-serif text-gray-800">Otros Cursos</h3>
                <p id="card-cert-sub" class="mt-4 text-pink-600 text-sm">Ver diplomas →</p>
            </a>

        </div>
    </main>

    <script>
        const content = {
            es: {
                desc: "Licenciada en Derecho con equivalencia académica en Alemania (Nivel entre Bachelor y Master).",
                edu: "Formación", descIt: "Systemintegration (Umschulung i.A.)",
                cardCv: "Curriculum Vitae", cardCvSub: "Lebenslauf digital ↓",
                cardCert: "Otros Cursos", cardCertSub: "Ver diplomas →"
            },
            en: {
                desc: "Law Graduate with academic equivalence in Germany (Bachelor/Master level).",
                edu: "Education", descIt: "IT Specialist (System Integration)",
                cardCv: "Curriculum Vitae", cardCvSub: "Digital Resume ↓",
                cardCert: "Other Courses", cardCertSub: "View certificates →"
            },
            de: {
                desc: "Rechtswissenschaftlerin mit akademischer Gleichwertigkeit in Deutschland (Bachelor/Master).",
                edu: "Bildung", descIt: "Fachinformatikerin Systemintegration (i.A.)",
                cardCv: "Curriculum Vitae", cardCvSub: "Lebenslauf ansehen ↓",
                cardCert: "Weitere Kurse", cardCertSub: "Zertifikate ansehen →"
            }
        };

        function changeLang(lang) {
            document.getElementById('main-desc').innerText = content[lang].desc;
            document.getElementById('head-edu').innerText = content[lang].edu;
            document.getElementById('desc-it').innerText = content[lang].descIt;
            document.getElementById('card-cv').innerText = content[lang].cardCv;
            document.getElementById('card-cv-sub').innerText = content[lang].cardCvSub;
            document.getElementById('card-cert').innerText = content[lang].cardCert;
            document.getElementById('card-cert-sub').innerText = content[lang].cardCertSub;

            // Cambiar botones
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }
    </script>
</body>
</html>
