<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Yisel Ramirez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fdfbfb; font-family: 'Montserrat', sans-serif; color: #333; }
        .foto-perfil { width: 280px; height: 350px; object-fit: cover; border-radius: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); border: 4px solid white; }
        .tarjeta-click { background: white; border-radius: 25px; padding: 25px; border: 1px solid #eee; transition: 0.3s; cursor: pointer; }
        .tarjeta-click:hover { transform: translateY(-5px); border-color: #ff9a9e; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .visor-pdf { width: 100%; height: 500px; border-radius: 15px; border: none; margin-top: 15px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row items-center gap-12 mb-16">
            <img src="foto.jpg" alt="Yisel Ramirez" class="foto-perfil">
            <div class="text-center md:text-left">
                <h1 class="text-6xl font-bold font-serif text-gray-900 mb-4">Yisel Ramirez</h1>
                <p id="texto-sub" class="text-2xl text-gray-400 italic font-light"></p>
                <div class="mt-4 flex gap-2 justify-center md:justify-start">
                    <button onclick="cambiarIdioma('es')" class="px-3 py-1 border rounded">ES</button>
                    <button onclick="cambiarIdioma('de')" class="px-3 py-1 border rounded">DE</button>
                </div>
            </div>
        </header>

        <div onclick="abrirModal('cv')" class="tarjeta-click border-l-[12px] border-l-black mb-8">
            <h2 class="text-3xl font-bold font-serif">Curriculum Vitae</h2>
            <p id="desc-cv" class="text-gray-400"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div onclick="abrirModal('derecho')" class="tarjeta-click border-l-[12px] border-l-blue-400">
                <h3 id="tit-derecho" class="text-2xl font-bold font-serif"></h3>
                <p id="desc-derecho" class="text-gray-400"></p>
            </div>
            <div onclick="abrirModal('idioma')" class="tarjeta-click border-l-[12px] border-l-red-400">
                <h3 id="tit-idioma" class="text-2xl font-bold font-serif"></h3>
                <p id="desc-idioma" class="text-gray-400"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div onclick="abrirModal('it')" class="tarjeta-click border-l-[12px] border-l-green-400">
                <h3 class="text-2xl font-bold font-serif">Fachinformatikerin i.A.</h3>
                <p id="desc-it" class="text-gray-400"></p>
            </div>
            <div class="tarjeta-click border-l-[12px] border-l-pink-400 cursor-default">
                <h3 id="tit-otros" class="text-2xl font-bold font-serif mb-4"></h3>
                <div class="space-y-2 text-sm">
                    <p onclick="abrirModal('carta')" class="hover:text-pink-400 cursor-pointer">● Carta de Motivación</p>
                    <p onclick="abrirModal('skills')" class="hover:text-pink-400 cursor-pointer">● Habilidades</p>
                    <p onclick="abrirModal('intereses')" class="hover:text-pink-400 cursor-pointer">● Intereses</p>
                </div>
            </div>
        </div>
    </div>

    <div id="mi-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50" onclick="if(event.target == this) cerrar()">
        <div class="bg-white w-full max-w-5xl p-10 rounded-[40px] relative max-h-[90vh] overflow-y-auto">
            <button onclick="cerrar()" class="absolute top-6 right-8 text-4xl">&times;</button>
            <h2 id="modal-titulo" class="text-3xl font-serif mb-4"></h2>
            <div id="modal-cuerpo"></div>
        </div>
    </div>

    <script>
        const contenido = {
            es: {
                sub: "Licenciada en Derecho con equivalencia académica en Alemania (ZAB). Especializándome en IT.",
                dCv: "Trayectoria profesional completa.",
                tD: "Licenciatura en Derecho", dD: "Homologación ZAB.",
                tI: "Idiomas", dI: "Alemán B2 y Español.",
                dIT: "Umschulung Systemintegration.",
                tO: "Otros detalles",
                cv: { t: "Curriculum Vitae", f: "curriculum.pdf" },
                derecho: { t: "Anerkennung ZAB", f: "titulo_derecho.pdf" },
                idioma: { t: "Certificados", f: "certificado_b2.pdf" },
                it: { t: "Formación IT", f: "" },
                carta: { t: "Carta de Motivación", f: "" },
                skills: { t: "Habilidades", f: "" },
                intereses: { t: "Intereses", f: "" }
            },
            de: {
                sub: "Rechtswissenschaftlerin mit ZAB-Anerkennung. IT-Spezialisierung.",
                dCv: "Vollständiger Lebenslauf.",
                tD: "Jura-Abschluss", dD: "ZAB Anerkennung.",
                tI: "Sprachen", dI: "Deutsch B2.",
                dIT: "Umschulung Systemintegration.",
                tO: "Weitere Details",
                cv: { t: "Lebenslauf", f: "curriculum.pdf" },
                derecho: { t: "ZAB Anerkennung", f: "titulo_derecho.pdf" },
                idioma: { t: "Sprachzertifikate", f: "certificado_b2.pdf" },
                it: { t: "IT Ausbildung", f: "" },
                carta: { t: "Motivationsschreiben", f: "" },
                skills: { t: "Fähigkeiten", f: "" },
                intereses: { t: "Interessen", f: "" }
            }
        };

        let lang = 'es';
        function cambiarIdioma(l) {
            lang = l;
            const c = contenido[l];
            document.getElementById('texto-sub').innerText = c.sub;
            document.getElementById('desc-cv').innerText = c.dCv;
            document.getElementById('tit-derecho').innerText = c.tD;
            document.getElementById('desc-derecho').innerText = c.dD;
            document.getElementById('tit-idioma').innerText = c.tI;
            document.getElementById('desc-idioma').innerText = c.dI;
            document.getElementById('desc-it').innerText = c.dIT;
            document.getElementById('tit-otros').innerText = c.tO;
        }

        function abrirModal(t) {
            const i = contenido[lang][t];
            document.getElementById('modal-titulo').innerText = i.t;
            let h = '';
            if(i.f) h = `<iframe src="${i.f}" class="visor-pdf"></iframe>`;
            else h = `<p>Información detallada sobre ${i.t}...</p>`;
            document.getElementById('modal-cuerpo').innerHTML = h;
            document.getElementById('mi-modal').classList.remove('hidden');
            document.getElementById('mi-modal').classList.add('flex');
        }

        function cerrar() { document.getElementById('mi-modal').classList.replace('flex', 'hidden'); }
        window.onload = () => cambiarIdioma('es');
    </script>
</body>
</html>
