<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel Ramirez | Portfolio Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfbfb; font-family: 'Montserrat', sans-serif; color: #333; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        /* FOTO DE PERFIL */
        .contenedor-foto { width: 280px; height: 380px; background: #ddd; border-radius: 35px; overflow: hidden; border: 6px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.05); flex-shrink: 0; }
        .contenedor-foto img { width: 100%; height: 100%; object-fit: cover; }

        /* TARJETAS */
        .bloque-yisel { background: white; border-radius: 25px; padding: 25px; border: 1px solid #f0f0f0; transition: 0.3s; cursor: pointer; }
        .bloque-yisel:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); border-color: #ff9a9e; }
        
        .btn-lang { cursor: pointer; padding: 7px 15px; border-radius: 20px; font-weight: 600; background: #fff; border: 1px solid #eee; font-size: 11px; }
        .btn-lang.active { background: #222 !important; color: #fff !important; }
        
        .mini-etiqueta { background: #fff5f5; color: #ff9a9e; padding: 3px 10px; border-radius: 8px; font-size: 9px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        
        .pdf-box { width: 100%; height: 500px; border-radius: 15px; border: 1px solid #eee; margin-top: 15px; }
        
        .enlace-doc { display: block; padding: 6px 0; border-bottom: 1px solid #fcfcfc; transition: 0.2s; font-size: 14px; font-weight: 500; }
        .enlace-doc:hover { color: #ff9a9e; padding-left: 4px; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6 max-w-7xl mx-auto flex justify-between items-center">
        <div class="text-xl font-bold italic tracking-tighter">Y. Ramirez</div>
        <div class="flex gap-3">
            <button onclick="changeLang('es')" id="btn-es" class="btn-lang active">ES</button>
            <button onclick="changeLang('de')" id="btn-de" class="btn-lang">DE</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6">
        
        <header class="flex flex-col md:flex-row items-center gap-10 mb-16 pt-6">
            <div class="contenedor-foto">
                <img src="foto.jpg" alt="Yisel Ramirez">
            </div>
            <div class="text-center md:text-left">
                <h1 class="text-5xl md:text-6xl font-bold text-gray-900 mb-4">Yisel Ramirez</h1>
                <p id="txt-hero" class="text-xl text-gray-400 italic font-light max-w-lg"></p>
                <div class="mt-6">
                    <a href="mailto:tu-correo@ejemplo.com" id="btn-mail" class="bg-black text-white px-10 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-pink-400 shadow-lg inline-block">Contactar</a>
                </div>
            </div>
        </header>

        <div class="mb-6">
            <div onclick="abrirModal('cv')" class="bloque-yisel border-l-[10px] border-l-black flex justify-between items-center">
                <div>
                    <span class="mini-etiqueta">Principal</span>
                    <h2 class="text-2xl font-bold">Curriculum Vitae</h2>
                    <p id="txt-cv-desc" class="text-gray-400 text-sm mt-1"></p>
                </div>
                <div class="text-3xl opacity-20">📄</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div onclick="abrirModal('derecho')" class="bloque-yisel border-l-[10px] border-l-blue-400">
                <span class="mini-etiqueta">Académico</span>
                <h3 id="tit-derecho" class="text-xl font-bold"></h3>
                <p id="des-derecho" class="text-gray-400 text-sm mt-1"></p>
            </div>
            <div onclick="abrirModal('idioma')" class="bloque-yisel border-l-[10px] border-l-red-400">
                <span class="mini-etiqueta">Idiomas</span>
                <h3 id="tit-idioma" class="text-xl font-bold"></h3>
                <p id="des-idioma" class="text-gray-400 text-sm mt-1"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onclick="abrirModal('it')" class="bloque-yisel border-l-[10px] border-l-green-400">
                <span class="mini-etiqueta">Formación IT</span>
                <h3 class="text-xl font-bold">Fachinformatikerin i.A.</h3>
                <p id="des-it" class="text-gray-400 text-sm mt-1"></p>
            </div>
            
            <div class="bloque-yisel border-l-[10px] border-l-pink-400 cursor-default">
                <span class="mini-etiqueta">Documentación</span>
                <h3 id="tit-otros" class="text-xl font-bold mb-3"></h3>
                <div class="space-y-1">
                    <span onclick="abrirModal('carta')" class="enlace-doc cursor-pointer">● Carta de Motivación</span>
                    <span onclick="abrirModal('skills')" class="enlace-doc cursor-pointer">● Habilidades & Skills</span>
                    <span onclick="abrirModal('hobbies')" class="enlace-doc cursor-pointer">● Intereses personales</span>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-box" class="fixed inset-0 bg-black/75 hidden items-center justify-center z-50 p-6 backdrop-blur-sm" onclick="if(event.target == this) cerrarModal()">
        <div class="bg-white w-full max-w-4xl rounded-[35px] p-10 relative shadow-2xl overflow-y-auto max-h-[90vh]">
            <button onclick="cerrarModal()" class="absolute top-6 right-8 text-4xl text-gray-300 hover:text-black">&times;</button>
            <h2 id="m-titulo" class="text-3xl font-serif mb-4"></h2>
            <div id="m-cuerpo" class="text-gray-600 leading-relaxed"></div>
        </div>
    </div>

    <script>
        let currentLang = 'es';

        const content = {
            es: {
                hero: "Licenciada en Derecho con equivalencia académica en Alemania (ZAB). Especializándome en IT.",
                btnMail: "Contactar",
                cvDesc: "Ver trayectoria profesional completa.",
                titLaw: "Licenciatura en Derecho", desLaw: "Anerkennung ZAB (Anabin H+).",
                titLang: "Idiomas & Títulos", desLang: "Alemán B2 y Español Nativo.",
                desIt: "Umschulung Systemintegration.",
                titOth: "Otros detalles",
                // Modales
                cv: { t: "Curriculum Vitae", c: "Mi experiencia profesional.", f: "curriculum.pdf" },
                derecho: { t: "Anerkennung ZAB", c: "Equivalencia de estudios en Alemania.", f: "titulo_derecho.pdf" },
                idioma: { t: "Certificados", c: "Nivel B2 certificado.", f: "certificado_b2.pdf" },
                it: { t: "Formación IT", c: "Especialización actual.", f: "" },
                carta: { t: "Carta de Motivación", c: "Mis razones para el cambio profesional.", f: "" },
                skills: { t: "Habilidades", c: "• Análisis Legal\n• Sistemas IT\n• Redes", f: "" },
                hobbies: { t: "Intereses", c: "Tecnología y cultura.", f: "" }
            },
            de: {
                hero: "Rechtswissenschaftlerin mit ZAB-Anerkennung. IT-Spezialisierung.",
                btnMail: "Kontakt",
                cvDesc: "Vollständiger Lebenslauf.",
                titLaw: "Jura Abschluss", desLaw: "ZAB Anerkennung (Anabin H+).",
                titLang: "Sprachen", desLang: "B2 Zertifikat & Muttersprache.",
                desIt: "Umschulung Systemintegration.",
                titOth: "Weitere Details",
                cv: { t: "Lebenslauf", c: "Beruflicher Werdegang.", f: "curriculum.pdf" },
                derecho: { t: "ZAB Anerkennung", c: "Gleichwertigkeitsbescheid.", f: "titulo_derecho.pdf" },
                idioma: { t: "Zertifikate", c: "Deutsch B2 Niveau.", f: "certificado_b2.pdf" },
                it: { t: "IT Ausbildung", c: "Aktuelle Ausbildung.", f: "" },
                carta: { t: "Motivationsschreiben", c: "Mein Weg in die IT.", f: "" },
                skills: { t: "Fähigkeiten", c: "• Analytik\n• IT-Systeme", f: "" },
                hobbies: { t: "Interessen", c: "Technologie & Lernen.", f: "" }
            }
        };

        function changeLang(lang) {
            currentLang = lang;
            const d = content[lang];
            document.getElementById('txt-hero').innerText = d.hero;
            document.getElementById('btn-mail').innerText = d.btnMail;
            document.getElementById('txt-cv-desc').innerText = d.cvDesc;
            document.getElementById('tit-derecho').innerText = d.titLaw;
            document.getElementById('des-derecho').innerText = d.desLaw;
            document.getElementById('tit-idioma').innerText = d.titLang;
            document.getElementById('des-idioma').innerText = d.desLang;
            document.getElementById('des-it').innerText = d.desIt;
            document.getElementById('tit-otros').innerText = d.titOth;

            document.querySelectorAll('.btn-lang').forEach(b => b.classList.toggle('active', b.id === 'btn-' + lang));
        }

        function abrirModal(tipo) {
            const info = content[currentLang][tipo];
            document.getElementById('m-titulo').innerText = info.t;
            let h = `<p class="whitespace-pre-line mb-4">${info.c}</p>`;
            if (info.f) h += `<iframe src="${info.f}#toolbar=0" class="pdf-box"></iframe>`;
            document.getElementById('m-cuerpo').innerHTML = h;
            document.getElementById('modal-box').classList.remove('hidden');
            document.getElementById('modal-box').classList.add('flex');
        }

        function cerrarModal() {
            document.getElementById('modal-box').classList.replace('flex', 'hidden');
        }

        window.onload = () => changeLang('es');
    </script>
</body>
</html>
