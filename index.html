<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel Ramirez | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfbfb; font-family: 'Montserrat', sans-serif; color: #333; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .tarjeta-movil { 
            background: white; 
            border-radius: 25px; 
            padding: 30px; 
            border: 1px solid #f0f0f0; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            display: block;
        }
        
        .tarjeta-movil:hover { 
            transform: translateY(-12px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border-color: #ff9a9e;
        }

        .lang-btn { cursor: pointer; padding: 8px 16px; border-radius: 20px; font-weight: 600; background: #fff; border: 1px solid #eee; font-size: 12px; transition: 0.3s; }
        .lang-btn.active { background: #333 !important; color: white !important; border-color: #333; }
        
        .tag { background: #fff5f5; color: #ff9a9e; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        
        .photo-wrapper { width: 300px; height: 400px; background: #eee; border-radius: 40px; overflow: hidden; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .fade-text { transition: opacity 0.3s ease-in-out; }
        
        .doc-link { transition: all 0.3s; display: block; width: 100%; margin-bottom: 10px; padding: 5px; border-radius: 8px; }
        .doc-link:hover { color: #ff9a9e; background: #fffafa; transform: translateX(5px); }
    </style>
</head>

            // Actualizar botones
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
