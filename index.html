    function changeLang(lang) {
        // Textos principales
        document.getElementById('main-desc').innerText = content[lang].desc;
        document.getElementById('btn-contact').innerText = content[lang].contact;
        document.getElementById('head-edu').innerText = content[lang].edu;
        document.getElementById('head-langs').innerText = content[lang].langs;
        document.getElementById('head-doc').innerText = content[lang].doc;
        
        // Bloque de Formación
        document.getElementById('tag-title').innerText = content[lang].tagTitle;
        document.getElementById('desc-law').innerText = content[lang].descLaw;
        document.getElementById('tag-now').innerText = content[lang].tagNow;
        document.getElementById('desc-it').innerText = content[lang].descIt;
        
        // Idiomas
        document.getElementById('lang-de').innerText = content[lang].langDe;
        document.getElementById('lang-en').innerText = content[lang].langEn;
        document.getElementById('lang-es').innerText = content[lang].langEs;
        document.getElementById('sub-aner').innerText = content[lang].subAner;
        document.getElementById('desc-aner').innerText = content[lang].descAner;

        document.getElementById('doc-exp').innerText = content[lang].docExp;
        document.getElementById('doc-carta').innerText = content[lang].docCarta;
        document.getElementById('doc-skills').innerText = content[lang].docSkills;

        document.getElementById('card-cv-sub').innerText = content[lang].cardCvSub;
        document.getElementById('card-cert').innerText = content[lang].cardCert;
        document.getElementById('card-cert-sub').innerText = content[lang].cardCertSub;

        // Botones activos
        ['es', 'en', 'de'].forEach(l => {
            document.getElementById('btn-' + l).classList.toggle('active', l === lang);
        });
    }

    // Opcional: Esto hace que se cargue en español al abrir la página
    window.onload = () => changeLang('es');
</script>
