<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yisel Ramirez | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfbfb; font-family: 'Montserrat', sans-serif; color: #333; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .tarjeta-movil { 
            background: white; 
            border-radius: 25px; 
            padding: 30px; 
            border: 1px solid #f0f0f0; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
        }
        
        .tarjeta-movil:hover { 
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border-color: #ff9a9e;
        }

        .lang-btn { cursor: pointer; padding: 8px 16px; border-radius: 20px; font-weight: 600; background: #fff; border: 1px solid #eee; font-size: 12px; transition: 0.3s; }
        .lang-btn.active { background: #333 !important; color: white !important; }
        
        .tag { background: #fff5f5; color: #ff9a9e; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .photo-wrapper { width: 300px; height: 400px; background: #eee; border-radius: 40px; overflow: hidden; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* Estilo para los elementos clicables dentro de las tarjetas */
        .clicable { cursor: pointer; transition: color 0.3s; }
        .clicable:hover { color: #ff9a9e; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-8 max-w-7xl mx-auto flex justify-between items-center">
        <div class="text-2xl font-bold italic">Y. Ramirez</div>
        <div class="flex gap-2">
            <button onclick="changeLang('es')" id="btn-es" class="lang-btn active">ES</button>
            <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
            <button onclick="changeLang('de')" id="btn-de" class="lang-btn">DE</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        
        <section class="flex flex-col md:flex-row items-center justify-between gap-12 mb-16">
            <div class="w-full md:w-2/3">
                <h1 class="text-5xl md:text-7xl font-bold text-gray-900 mb-6">Yisel Ramirez</h1>
                <p id="main-desc" class="text-2xl text-gray-400 italic font-light max-w-xl"></p>
                <div class="mt-8">
                    <a href="mailto:tu-correo@ejemplo.com" id="btn-contact" class="inline-block bg-black text-white px-8 py-4 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-pink-400 transition transform hover:-translate-y-1 shadow-lg">Contactar</a>
                </div>
            </div>
            <div class="photo-wrapper">
                <img src="foto.jpg" alt="Yisel Ramirez">
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            
            <div onclick="abrirModal('it')" class="tarjeta-movil cursor-pointer group">
                <h2 id="head-edu" class="text-2xl font-bold mb-6 italic"></h2>
                <div class="space-y-4">
                    <div>
                        <span id="tag-now" class="tag"></span>
                        <h3 class="font-bold text-lg mt-1 group-hover:text-pink-400">Fachinformatikerin</h3>
                        <p id="desc-it" class="text-gray-500 text-sm"></p>
                    </div>
                </div>
            </div>

            <div class="tarjeta-movil">
                <h2 id="head-langs" class="text-2xl font-bold mb-6 italic"></h2>
                <div class="space-y-3">
                    <p onclick="abrirModal('langDe')" class="clicable text-gray-500 text-sm italic" id="txt-lang-de"></p>
                    <p onclick="abrirModal('langEs')" class="clicable text-gray-500 text-sm italic" id="txt-lang-es"></p>
                    <hr class="my-4 border-gray-100">
                    <div onclick="abrirModal('derecho')" class="clicable">
                        <h3 id="sub-aner" class="font-bold"></h3>
                        <p id="desc-aner" class="text-gray-400 text-xs italic"></p>
                    </div>
                </div>
            </div>

            <div class="tarjeta-movil">
                <h2 id="head-doc" class="text-2xl font-bold mb-6 italic"></h2>
                <div class="space-y-4 text-sm font-medium">
                    <p onclick="abrirModal('exp')" class="clicable" id="doc-exp"></p>
                    <p onclick="abrirModal('carta')" class="clicable" id="doc-carta"></p>
                    <p onclick="abrirModal('skills')" class="clicable" id="doc-skills"></p>
                    <p onclick="abrirModal('hobbies')" class="clicable" id="doc-hobbies"></p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-12">
            <a href="tu-cv.pdf" target="_blank" class="tarjeta-movil bg-black text-white p-10 rounded-[40px] flex justify-between items-center shadow-xl border-none">
                <div>
                    <h3 id="card-cv" class="text-3xl font-serif text-white"></h3>
                    <p id="card-cv-sub" class="text-gray-400 text-xs uppercase mt-2 tracking-widest"></p>
                </div>
                <div class="text-4xl text-white">↓</div>
            </a>

            <a href="tus-certificados.pdf" target="_blank" class="tarjeta-movil bg-pink-100 p-10 rounded-[40px] flex justify-between items-center shadow-xl border-none">
                <div>
                    <h3 id="card-cert" class="text-3xl font-serif text-gray-800"></h3>
                    <p id="card-cert-sub" class="text-pink-400 text-xs uppercase mt-2 tracking-widest"></p>
                </div>
                <div class="text-4xl text-gray-800">→</div>
            </a>
        </div>
    </main>

    <div id="modal-info" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm" onclick="if(event.target == this) cerrarModal()">
        <div class="bg-white w-full max-w-2xl rounded-[40px] p-10 relative shadow-2xl">
            <button onclick="cerrarModal()" class="absolute top-6 right-8 text-3xl text-gray-300 hover:text-pink-400">&times;</button>
            <h2 id="modal-titulo" class="text-3xl font-serif mb-6 text-gray-900 border-b pb-4"></h2>
            <div id="modal-cuerpo" class="text-gray-600 leading-relaxed text-lg"></div>
        </div>
    </div>

    <script>
        let currentLang = 'es';

        const content = {
            es: {
                desc: "Licenciada en Derecho con equivalencia académica en Alemania (Nivel entre Bachelor y Master).",
                contact: "Contactar", edu: "Formación", langs: "Idiomas & Títulos", doc: "Documentación",
                tagNow: "Actualidad", descIt: "Systemintegration (Umschulung i.A.). Clic para detalles.",
                langDe: "Alemán: B2 (Avanzado)", langEs: "Español: Nativo",
                subAner: "Anerkennung", descAner: "Título de Derecho homologado. Clic para detalles.",
                docExp: "• Experiencia Laboral", docCarta: "• Initiativbewerbung", docSkills: "• Skills & Habilidades", docHobbies: "• Intereses",
                cardCv: "Curriculum Vitae", cardCvSub: "Lebenslauf digital", 
                cardCert: "Otros Cursos", cardCertSub: "Certificaciones adicionales",
                // Contenido de los Modales
                it: { t: "Fachinformatikerin", c: "Actualmente en proceso de reconversión profesional hacia la integración de sistemas. Enfoque en redes, administración de servidores y soporte técnico." },
                derecho: { t: "Homologación de Título", c: "Título homologado por la ZAB (Anabin H+). Mi formación jurídica es equivalente a un nivel entre Bachelor y Master en el sistema alemán." },
                langDe: { t: "Certificado de Alemán", c: "Nivel B2 certificado. Capacidad fluida para la comunicación técnica y profesional en entornos de trabajo alemanes." },
                langEs: { t: "Español Nativo", c: "Lengua materna. Capacidad de comunicación experta y redacción de documentos complejos." },
                exp: { t: "Experiencia Laboral", c: "Trayectoria en derecho y administración, demostrando gran capacidad de aprendizaje y adaptación a nuevos entornos tecnológicos." },
                carta: { t: "Candidatura", c: "Motivación por la tecnología y el sector IT en Alemania, combinando rigor jurídico con resolución técnica de problemas." },
                skills: { t: "Habilidades", c: "Resolución de problemas complejos, administración de sistemas, análisis de datos y trabajo en equipo multicultural." },
                hobbies: { t: "Intereses", c: "Apasionada por la tecnología emergente, el aprendizaje de idiomas y la integración cultural." }
            },
            en: {
                desc: "Law Graduate with academic equivalence in Germany (Bachelor/Master level).",
                contact: "Contact", edu: "Education", langs: "Languages & Degrees", doc: "Documentation",
                tagNow: "Current", descIt: "System Integration (Retraining). Click for details.",
                langDe: "German: B2 (Advanced)", langEs: "Spanish: Native",
                subAner: "Recognition", descAner: "Recognized Law degree. Click for details.",
                docExp: "• Experience", docCarta: "• Application", docSkills: "• Skills", docHobbies: "• Interests",
                cardCv: "Resume", cardCvSub: "Digital CV", cardCert: "Other Courses", cardCertSub: "Extra Certs",
                it: { t: "IT Specialist", c: "Vocational retraining in System Integration. Skills include network configuration, server management, and IT security." },
                derecho: { t: "Degree Equivalence", c: "Law degree recognized by ZAB (Anabin H+). Equivalent to Bachelor/Master level in Germany." },
                langDe: { t: "German Certificate", c: "B2 Level. Proficient in professional and technical communication within German workspaces." },
                langEs: { t: "Native Spanish", c: "Native speaker with expert communication and complex document drafting skills." },
                exp: { t: "Work Experience", c: "Background in law and administration, showing strong learning capabilities and technical transition skills." },
                carta: { t: "Application Letter", c: "Passionate about IT and technology, combining legal precision with technical problem-solving." },
                skills: { t: "Key Skills", c: "Critical thinking, system administration, data analysis, and multicultural teamwork." },
                hobbies: { t: "Personal Interests", c: "Interested in emerging tech, language learning, and cultural integration." }
            },
            de: {
                desc: "Rechtswissenschaftlerin mit akademischer Gleichwertigkeit in Deutschland (Bachelor/Master).",
                contact: "Kontakt", edu: "Bildung", langs: "Sprachen & Anerkennung", doc: "Dokumentation",
                tagNow: "Aktuell", descIt: "Systemintegration (Umschulung i.A.). Klicken.",
                langDe: "Deutsch: B2 (Fortgeschritten)", langEs: "Spanisch: Muttersprache",
                subAner: "Anerkennung", descAner: "Anerkannter Jura-Abschluss. Klicken.",
                docExp: "• Berufserfahrung", docCarta: "• Initiativbewerbung", docSkills: "• Fähigkeiten", docHobbies: "• Hobbys",
                cardCv: "Lebenslauf", cardCvSub: "Digitaler Lebenslauf", cardCert: "Weitere Kurse", cardCertSub: "Zusätzliche Zertifikate",
                it: { t: "Fachinformatikerin", c: "Umschulung zur Fachinformatikerin für Systemintegration. Schwerpunkte: Netzwerktechnik, Serveradministration und IT-Support." },
                derecho: { t: "ZAB Anerkennung", c: "Mein Jura-Abschluss ist von der ZAB offiziell anerkannt (Anabin H+), was einem Bachelor/Master-Niveau entspricht." },
                langDe: { t: "Deutsch Zertifikat", c: "B2 Niveau. Sicher in der professionellen und technischen Kommunikation am Arbeitsplatz." },
                langEs: { t: "Spanisch Muttersprache", c: "Muttersprachlerin mit Fachkenntnissen in komplexer Schriftführung und Kommunikation." },
                exp: { t: "Berufserfahrung", c: "Erfahrung in Recht und Verwaltung, hohe Lernbereitschaft und erfolgreiche Spezialisierung im IT-Bereich." },
                carta: { t: "Bewerbung", c: "Motivation für IT und Technologie, die rechtliche Präzision mit technischer Lösungskompetenz verbindet." },
                skills: { t: "Fähigkeiten", c: "Komplexes Problemlösen, Systemadministration, Datenanalyse und interkulturelle Teamarbeit." },
                hobbies: { t: "Interessen", c: "Interesse an neuen Technologien, Sprachenlernen und kultureller Integration." }
            }
        };

        function changeLang(lang) {
            currentLang = lang;
            const d = content[lang];
            
            document.getElementById('main-desc').innerText = d.desc;
            document.getElementById('btn-contact').innerText = d.contact;
            document.getElementById('head-edu').innerText = d.edu;
            document.getElementById('head-langs').innerText = d.langs;
            document.getElementById('head-doc').innerText = d.doc;
            document.getElementById('tag-now').innerText = d.tagNow;
            document.getElementById('desc-it').innerText = d.descIt;
            document.getElementById('txt-lang-de').innerText = d.langDe;
            document.getElementById('txt-lang-es').innerText = d.langEs;
            document.getElementById('sub-aner').innerText = d.subAner;
            document.getElementById('desc-aner').innerText = d.descAner;
            document.getElementById('doc-exp').innerText = d.docExp;
            document.getElementById('doc-carta').innerText = d.docCarta;
            document.getElementById('doc-skills').innerText = d.docSkills;
            document.getElementById('doc-hobbies').innerText = d.docHobbies;
            document.getElementById('card-cv').innerText = d.cardCv;
            document.getElementById('card-cv-sub').innerText = d.cardCvSub;
            document.getElementById('card-cert').innerText = d.cardCert;
            document.getElementById('card-cert-sub').innerText = d.cardCertSub;

            ['es', 'en', 'de'].forEach(l => {
                document.getElementById('btn-' + l).classList.toggle('active', l === lang);
            });
        }

        function abrirModal(tipo) {
            const modal = document.getElementById('modal-info');
            const titulo = document.getElementById('modal-titulo');
            const cuerpo = document.getElementById('modal-cuerpo');
            
            titulo.innerText = content[currentLang][tipo].t;
            cuerpo.innerText = content[currentLang][tipo].c;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function cerrarModal() {
            document.getElementById('modal-info').classList.replace('flex', 'hidden');
        }

        window.onload = () => changeLang('es');
    </script>
</body>
</html>
