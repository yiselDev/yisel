        /* Navegación Unificada Rosada */

        .tarjeta-pro { background: white; border-radius: 24px; padding: 35px; border: 1px solid #eee; transition: 0.4s; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; height: 100%; }

        .skill-badge { background: #f8f9fa; padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 600; border: 1px solid #eee; color: #444; }
        
        .proyectos-section { background: #111; color: white; border-radius: 40px; padding: 80px 40px; }
        .proyecto-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 24px; transition: 0.3s; }
        .proyecto-card:hover { border-color: #be185d; background: rgba(255,255,255,0.07); }

        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 100; display: none; position: fixed; inset: 0; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex !important; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
