<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fafafa; font-family: 'Montserrat', sans-serif; color: #2d3436; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .nav-link { position: relative; transition: 0.3s; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0; background-color: #ff9a9e; transition: 0.3s; }
        .nav-link:hover::after { width: 100%; }

        .grid-proyectos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 20px 0;
        }

        .tarjeta-pro { 
            background: white; 
            border-radius: 24px; 
            padding: 40px; 
            border: 1px solid #eee; 
            transition: all 0.4s ease; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            min-height: 320px;
            cursor: pointer;
        }

        .tarjeta-pro:hover { 
            transform: translateY(-10px); 
            border-color: #ff9a9e; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
        }

        .tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 15px; width: fit-content; }
        
        .modal-overlay { 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px); 
            z-index: 100; 
            display: none; 
            position: fixed; 
            inset: 0;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        
        .btn-idioma { transition: 0.3s; border: 1px solid #eee; padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .btn-idioma.active { background: #2d3436; color: white; }
    </style>
</head>
